<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MuseScore Downloader</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f4f5f7;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Header Style simile all'immagine */
        .main-header {
            background-color: #3a9cff;
            color: white;
            padding: 1.5rem 0;
            text-align: center;
            margin-bottom: 2rem;
            border-bottom: 4px solid #3a9cff;
        }

        .main-header h1 {
            margin: 0;
            font-weight: 700;
            font-size: 1.8rem;
            letter-spacing: 0.5px;
        }

        .main-header h1 i {
            color: #3a9cff;
            margin-right: 10px;
        }

        /* Card Style */
        .card {
            border: none;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 2rem;
        }

        .card-header {
            background-color: transparent;
            border-bottom: 1px solid #e9ecef;
            padding: 1rem 1.25rem;
            font-weight: 600;
        }

        /* Form Inputs */
        .form-control, .form-select {
            border-radius: 6px;
            border: 1px solid #ced4da;
            background-color: #fff;
        }

        .form-control:focus {
            border-color: #3a9cff;
            box-shadow: 0 0 0 0.2rem rgba(58, 156, 255, 0.25);
        }


        /* Pulsante Principale (Scarica Spartito) */
        .btn-primary-custom {
            background-color: #3a9cff;
            border-color: #3a9cff;
            font-weight: 600;
            padding: 0.6rem 1.5rem;
            border-radius: 6px;
            transition: background-color 0.2s;
        }

        .btn-primary-custom:hover {
            background-color: #2887e3;
            border-color: #2887e3;
        }

        .btn-primary-custom:disabled {
            background-color: #a0c9ff;
            border-color: #a0c9ff;
        }

        /* Tabella Styles */
        .table th {
            font-weight: 600;
            color: #555;
            border-bottom: 2px solid #dee2e6;
            font-size: 0.9rem;
        }

        .table td {
            vertical-align: middle;
            font-size: 0.9rem;
        }

         /* Status Badges - Colori Migliorati */
        .status-badge {
            padding: .35em .65em;
            border-radius: 50rem; /* Pil shape */
            font-size: 0.8em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .bg-analyzing { background-color: #e7f1ff; color: #0d6efd; border: 1px solid #b6d4fe; } /* Blu Chiaro */
        .bg-downloading { background-color: #fff3cd; color: #664d03; border: 1px solid #ffecb5; } /* Giallo */
        .bg-processing { background-color: #f3e5f5; color: #7b1fa2; border: 1px solid #e1bee7; } /* Viola */
        .bg-completed { background-color: #d1e7dd; color: #0f5132; border: 1px solid #badbcc; } /* Verde */
        .bg-error { background-color: #f8d7da; color: #842029; border: 1px solid #f5c2c7; } /* Rosso */

        /* Icone azioni tabella */
        .action-btn {
            width: 32px;
            height: 32px;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="main-header shadow-sm">
        <h1><i class="bi bi-music-note-beamed"></i>Music Sheet Downloader</h1>
    </div>

    <div class="container">
        <!-- Form Card -->
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span><i class=""></i>Input</span>
    
            </div>
            <div class="card-body p-4">
                <form id="downloadForm">
                    <!-- URL Input -->
                    <div class="mb-3">
                        <label for="url" class="form-label">Download url</label>
                        <input type="url" class="form-control" id="url" name="url" 
                               placeholder="Inserisci qui il link dello spartito..." required>
                    </div>

                    <div class="row mb-3">
                        <!-- Scale Input -->
                        <div class="col-md-6">
                            <label for="scale" class="form-label">Scala di ridimensionamento</label>
                            <input type="number" class="form-control" id="scale" name="scale" value="2" step="0.1" min="1">
                            <small class="text-muted">Es: 2x</small>
                        </div>
                        <!-- Sharpen Input -->
                        <div class="col-md-6">
                            <label for="sharpen_count" class="form-label">Intensità del filtro Sharpen</label>
                            <input type="number" class="form-control" id="sharpen_count" name="sharpen_count" value="1" min="0">
                            <small class="text-muted">Es: 1</small>
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary-custom btn-block" id="btnSubmit">
                            <i class="bi bi-download me-2"></i>Scarica Spartito
                        </button>
                    </div>
                </form>

                <!-- Progress Area -->
                <div id="progressContainer" class="mt-4" style="display: none;">
                    <div class="d-flex justify-content-between mb-1">
                        <span id="progressText" class="text-muted small">Inizializzazione...</span>
                    </div>
                    <div class="progress" style="height: 6px;">
                        <div id="progressBar" class="progress-bar bg-primary" role="progressbar" style="width: 0%"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- History Table Card -->
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <div>
                    <span><i class="bi bi-clock-history me-2"></i>Storico Download</span>
                    <span id="connStatus" class="connection-status text-success">
                        <i class="bi bi-broadcast"></i> Live
                    </span>
                </div>
                <!-- Il pulsante manuale non è più necessario con SSE, ma utile come fallback -->
                <button class="btn btn-sm btn-outline-secondary" onclick="fetchRecordsManual()" title="Ricarica Manualmente">
                    <i class="bi bi-arrow-clockwise"></i>
                </button>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead>
                            <tr>
                                <th>File</th>
                                <th>Dim.</th>
                                <th>Stato</th>
                                <th>Scala</th>
                                <th>Filtro</th>
                                <th>Fonte</th>
                                <th>Data</th>
                                <th style="width: 80px;">Azioni</th>
                            </tr>
                        </thead>
                        <tbody id="recordsTable">
                            <tr><td colspan="8" class="text-center text-muted p-4">Caricamento...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const recordsTable = document.getElementById('recordsTable');
        const downloadForm = document.getElementById('downloadForm');
        const progressContainer = document.getElementById('progressContainer');
        const progressText = document.getElementById('progressText');
        const btnSubmit = document.getElementById('btnSubmit');
        const connStatus = document.getElementById('connStatus');

        // --- GESTIONE REAL-TIME (SSE) ---
        function connectEventSource() {
            const es = new EventSource("/stream");
            
            es.onopen = function() {
                connStatus.innerHTML = '<i class="bi bi-broadcast"></i> Live';
                connStatus.className = "connection-status text-success";
            };

            es.onmessage = function(event) {
                // Il server invia direttamente la lista dei record in JSON
                try {
                    const records = JSON.parse(event.data);
                    renderTable(records);
                } catch (e) {
                    console.error("Errore parsing dati SSE:", e);
                }
            };

            es.onerror = function() {
                connStatus.innerHTML = '<i class="bi bi-broadcast"></i> Disconnesso';
                connStatus.className = "connection-status text-danger";
                // Tentativo di riconnessione automatico gestito dal browser, ma chiudiamo e riapriamo per sicurezza
                // es.close();
                // setTimeout(connectEventSource, 5000);
            };
        }

        // Avvia connessione SSE al caricamento
        document.addEventListener('DOMContentLoaded', connectEventSource);

        // Funzione manuale di fallback (chiamata dal pulsante)
        async function fetchRecordsManual() {
            try {
                const response = await fetch('/records');
                const records = await response.json();
                renderTable(records);
            } catch (e) {
                console.error("Errore caricamento manuale", e);
            }
        }

        // --- LOGICA TABELLA ---
        function formatSize(bytes) {
            if (!bytes || bytes === 0) return '0 B';
            const k = 1024; const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
        }

        function mapStatus(status) {
            const s = (status || "").toLowerCase();
            const map = {
                'analyzing': { class: 'bg-analyzing', text: 'Analisi' },
                'downloading_pages': { class: 'bg-downloading', text: 'Download' },
                'processing': { class: 'bg-processing', text: 'Elaborazione' },
                'completed': { class: 'bg-completed', text: 'Completato' },
                'error': { class: 'bg-error', text: 'Errore' }
            };
            return map[s] || { class: 'bg-secondary', text: status };
        }

        function renderTable(records) {
            recordsTable.innerHTML = '';
            if (records.length === 0) {
                recordsTable.innerHTML = '<tr><td colspan="8" class="text-center text-muted p-4">Nessun download presente.</td></tr>';
                return;
            }

            records.forEach(record => {
                const fileId = record.file_name.replace('spartito_', '').replace('.pdf', '');
                const currentStatus = (record.status || "").toLowerCase();
                const isCompleted = (currentStatus === 'completed');
                const statusInfo = mapStatus(record.status);
                
                let actionsHtml = '<div class="d-flex gap-1">';
                if (isCompleted) {
                    actionsHtml += `
                        <button class="btn btn-sm btn-outline-success action-btn" onclick="downloadFile('${fileId}')" title="Scarica">
                            <i class="bi bi-download"></i>
                        </button>
                        <button class="btn btn-sm btn-outline-danger action-btn" onclick="deleteFile('${fileId}')" title="Elimina">
                            <i class="bi bi-trash"></i>
                        </button>`;
                } else {
                    actionsHtml += `
                        <button class="btn btn-sm btn-outline-danger action-btn" onclick="deleteFile('${fileId}')" title="Elimina">
                            <i class="bi bi-trash"></i>
                        </button>`;
                }
                actionsHtml += '</div>';

                const shortUrl = record.source_url.length > 20 
                    ? record.source_url.substring(0, 20) + '...' 
                    : record.source_url;

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><code class="small text-dark">${record.file_name}</code></td>
                    <td>${formatSize(record.size)}</td>
                    <td><span class="status-badge ${statusInfo.class}">${statusInfo.text}</span></td>
                    <td>${record.scale || '-'}</td>
                    <td>${record.filter || '-'}</td>
                    <td><a href="${record.source_url}" target="_blank" class="text-decoration-none">${shortUrl} <i class="bi bi-box-arrow-up-right small"></i></a></td>
                    <td>${new Date(record.created_at).toLocaleDateString('it-IT')}</td>
                    <td>${actionsHtml}</td>
                `;
                recordsTable.appendChild(row);
            });
        }

        // --- AZIONI UTENTE ---
        
        // Download File
        function downloadFile(fileId) {
            window.location.href = `/download_file/${fileId}`;
        }

        // Elimina File (ora non serve più ricaricare manualmente la tabella, ci penserà il broadcast)
        async function deleteFile(fileId) {
            if (!confirm("Sei sicuro di voler eliminare questo file?")) return;
            try {
                // Il backend invierà automaticamente l'aggiornamento via SSE
                await fetch(`/delete/${fileId}`, { method: 'POST' });
            } catch (err) {
                alert("Errore di rete.");
            }
        }

        // Submit Form
        downloadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const url = document.getElementById('url').value;
            const scale = document.getElementById('scale').value;
            const sharpen_count = document.getElementById('sharpen_count').value;

            btnSubmit.disabled = true;
            btnSubmit.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Avvio...';

            try {
                const response = await fetch('/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, scale, sharpen_count })
                });
                
                const data = await response.json();
                
                if (data.task_id) {
                    progressContainer.style.display = 'block';
                    pollStatus(data.task_id); // Mantiene il polling per la progress bar specifica
                } else {
                    alert("Errore: " + (data.error || "Impossibile avviare il task"));
                    resetFormUI();
                }
            } catch (err) {
                alert("Errore di connessione.");
                resetFormUI();
            }
        });

        function resetFormUI() {
            btnSubmit.disabled = false;
            btnSubmit.innerHTML = '<i class="bi bi-download me-2"></i>Scarica Spartito';
        }

        // Polling per la progress bar del task corrente
        function pollStatus(taskId) {
            const interval = setInterval(async () => {
                try {
                    const res = await fetch(`/status/${taskId}`);
                    const data = await res.json();
                    if (data.status === 'not_found') {
                        clearInterval(interval); resetFormUI(); progressContainer.style.display = 'none'; return;
                    }

                    let statusText = mapStatus(data.status).text;
                    progressText.innerText = `Stato: ${statusText}`;

                    if (data.status === 'completed' || data.status === 'error') {
                        clearInterval(interval);
                        setTimeout(() => {
                            progressContainer.style.display = 'none';
                            resetFormUI();
                            // Non serve fetchRecords qui: l'SSE aggiornerà la tabella automaticamente
                        }, 1000);
                    }
                } catch (err) {
                    console.error(err); clearInterval(interval);
                }
            }, 2000);
        }
    </script>
</body>
</html>
